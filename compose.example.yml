services:
  claude-workstation:
    image: ghcr.io/henricos/claude-workstation:latest
    container_name: claude-workstation
    hostname: workstation
    volumes:
      # Claude Code config, OAuth login, memory, and settings
      - /opt/claude-workstation/.claude:/home/claude/.claude
      # SSH keys directory: authorized_keys (inbound access) + private key for GitHub (outbound access)
      - /opt/claude-workstation/.ssh:/home/claude/.ssh
      # Git identity files used by the agent when committing.
      # Place .gitconfig, .gitconfig-work, etc. in this directory — the entrypoint
      # symlinks each file into ~/. Files must be named exactly as they appear in ~.
      - /opt/claude-workstation/gitconfig:/mnt/gitconfig:ro
      # Your code repositories
      - /home/user/projects:/home/claude/work
      # Docker socket — gives the agent full access to the host Docker daemon (equivalent to root on
      # the host). Keep commented unless you explicitly need the agent to build or run containers.
      # Note: paths in docker run -v are resolved on the HOST, not inside the container.
      # - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "2222:22"
    restart: unless-stopped
